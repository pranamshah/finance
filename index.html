<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Finance Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
:root {
  --green: #1a7a4a;
  --green-light: #e8f5ee;
  --red: #c0392b;
  --red-light: #fdecea;
  --blue: #1a5fa0;
  --blue-light: #e8f0fb;
  --bg: #f7f6f2;
  --card: #ffffff;
  --border: #e0ddd6;
  --text: #1a1a1a;
  --muted: #666660;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
#app-container{max-width:820px;margin:0 auto;padding-bottom:74px}
#loading-screen{position:fixed;inset:0;background:#fff;display:flex;align-items:center;justify-content:center;z-index:9999;font-size:18px;color:var(--muted)}

/* NAV */
#bottom-nav{display:flex;position:fixed;bottom:0;left:0;right:0;height:64px;background:#fff;border-top:1px solid var(--border);z-index:100;max-width:820px;margin:0 auto}
#top-nav{display:none;position:fixed;top:0;left:0;right:0;height:52px;background:#fff;border-bottom:1px solid var(--border);z-index:100}
#top-nav-inner{max-width:820px;margin:0 auto;display:flex;height:100%}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border:none;background:transparent;cursor:pointer;font-family:inherit;font-size:11px;color:var(--text);transition:background 0.15s}
.nav-btn.active{background:var(--green);color:#fff}
.nav-btn .nav-icon{font-size:20px;line-height:1}
@media(min-width:769px){
  #bottom-nav{display:none}
  #top-nav{display:block}
  #app-container{padding-top:52px;padding-bottom:20px}
  .top-nav-btn{height:100%;padding:0 18px;border:none;background:transparent;cursor:pointer;font-family:inherit;font-size:14px;color:var(--text);display:flex;align-items:center;gap:6px;transition:background 0.15s}
  .top-nav-btn.active{background:var(--green);color:#fff}
}

/* TABS */
.tab-content{display:none}
.tab-content.active{display:block}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,0.07)}

/* DATE BAR */
#date-bar{position:sticky;top:52px;z-index:50;background:var(--green-light);padding:0 16px;height:48px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
@media(max-width:768px){#date-bar{top:0}}
#date-display{font-size:17px;font-weight:600;color:var(--text)}
#date-edit-btn{background:none;border:none;cursor:pointer;font-size:20px;padding:4px}
#date-input-wrap{display:none;align-items:center;gap:8px}
#date-input-wrap input{border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-family:inherit;font-size:14px}
#date-input-wrap button{padding:4px 10px;border:none;border-radius:6px;cursor:pointer;font-family:inherit;font-size:13px}

/* ENTRY TABLE */
#entry-section{padding:0 0 12px}
.entry-table{width:100%;border-collapse:collapse;table-layout:fixed}
.entry-table th{background:var(--green-light);font-size:12px;font-weight:600;color:var(--muted);padding:8px 6px;text-align:left;border-bottom:2px solid var(--border)}
.entry-table th:first-child{width:36px;text-align:center}
.entry-table th:nth-child(2){width:35%}
.entry-table th:nth-child(3){width:20%}
.entry-table th:nth-child(4){width:15%}
.entry-table td{border-bottom:1px solid var(--border);vertical-align:middle}
tr.active-row td{background:#fff}
tr.active-row{height:52px}
@media(max-width:768px){tr.active-row{height:56px}}
.cell-num{text-align:center;font-size:13px;color:var(--muted);padding:0 4px;width:36px}
.cell-input{width:100%;border:none;outline:none;background:transparent;font-family:inherit;font-size:16px;padding:4px 6px;color:var(--text)}
.cell-input::placeholder{color:#bbb}
.amount-wrap{display:flex;align-items:center;gap:2px}
.amount-prefix{color:#bbb;font-size:14px;padding-left:6px}
.cell-input.amount-input{font-weight:700}
.static-row td{padding:8px 6px;font-size:14px}
.static-row:hover{background:#f9f9f7;cursor:pointer}
.static-row td:first-child{text-align:center;color:var(--muted);font-size:13px}
.delete-btn{background:none;border:none;cursor:pointer;color:#bbb;font-size:16px;padding:2px 6px;border-radius:4px;transition:color 0.15s}
.delete-btn:hover{color:var(--red)}
.table-wrap{overflow-x:auto}

/* DROPDOWN */
.customer-dropdown{position:absolute;background:#fff;border:1px solid var(--border);border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,0.12);z-index:200;min-width:220px;max-width:320px;overflow:hidden}
.dropdown-item{padding:10px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-size:14px}
.dropdown-item:hover,.dropdown-item.focused{background:var(--green-light)}
.dropdown-item .d-name{font-weight:600}
.dropdown-item .d-balance{color:var(--muted);font-size:13px}
.dropdown-item.add-new{color:var(--green);font-weight:600}
.dropdown-wrap{position:relative}

/* SUMMARY CARDS */
#summary-cards{display:flex;gap:12px;padding:12px 0;flex-wrap:wrap}
.summary-card{flex:1;min-width:120px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;box-shadow:0 1px 4px rgba(0,0,0,0.07)}
.summary-card.green{border-left:4px solid var(--green)}
.summary-card.red{border-left:4px solid var(--red)}
.summary-card.blue{border-left:4px solid var(--blue)}
.summary-label{font-size:12px;color:var(--muted);margin-bottom:4px}
.summary-amount{font-size:22px;font-weight:700;color:var(--text)}

/* SHAKE */
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.shake{animation:shake 0.3s;background:rgba(192,57,43,0.08)!important}

/* TOAST */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:12px 28px;border-radius:8px;font-size:15px;z-index:9999;opacity:0;transition:opacity 0.3s;pointer-events:none}
@media(min-width:769px){#toast{bottom:24px}}

/* CLIENTS TAB */
#clients-header{display:flex;justify-content:space-between;align-items:center;padding:16px}
.btn-green{background:var(--green);color:#fff;border:none;border-radius:8px;padding:10px 18px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer}
.btn-gray{background:#e0ddd6;color:var(--text);border:none;border-radius:8px;padding:10px 18px;font-family:inherit;font-size:14px;cursor:pointer}
.btn-red{background:var(--red);color:#fff;border:none;border-radius:8px;padding:10px 18px;font-family:inherit;font-size:14px;cursor:pointer}
#new-client-form{padding:0 16px 16px;display:none}
#new-client-form .form-row{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap}
#new-client-form input{flex:1;min-width:140px;height:52px;border:1px solid var(--border);border-radius:8px;padding:0 14px;font-family:inherit;font-size:15px}
#new-client-form .btn-row{display:flex;gap:8px}
.client-card{margin:0 16px 10px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,0.07);cursor:pointer}
.client-card-header{display:flex;justify-content:space-between;align-items:flex-start}
.client-name-big{font-size:18px;font-weight:700}
.client-phone{font-size:13px;color:var(--muted);margin-top:2px}
.client-balance{font-size:16px;font-weight:600;color:var(--text)}
.client-detail{border-top:1px solid var(--border);margin-top:14px;padding-top:14px;display:none}
.stat-boxes{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.stat-box{flex:1;min-width:90px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;text-align:center}
.stat-box-label{font-size:11px;color:var(--muted);margin-bottom:4px}
.stat-box-val{font-size:16px;font-weight:700;color:var(--text)}
.section-title{font-size:14px;font-weight:700;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px}
.detail-table{width:100%;border-collapse:collapse;font-size:13px}
.detail-table th{text-align:left;padding:6px 8px;background:var(--green-light);color:var(--muted);font-size:12px}
.detail-table td{padding:7px 8px;border-bottom:1px solid var(--border)}
.detail-table tr:last-child td{border-bottom:none}
.edit-icon-btn{background:none;border:none;cursor:pointer;font-size:16px;padding:2px 6px}
.loan-form{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:14px;margin-top:12px}
.loan-form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.loan-form label{font-size:12px;color:var(--muted);display:block;margin-bottom:4px}
.loan-form input{width:100%;height:40px;border:1px solid var(--border);border-radius:6px;padding:0 10px;font-family:inherit;font-size:14px}

/* RECORDS TAB */
#records-subtabs{display:flex;border-bottom:2px solid var(--border);padding:0 16px}
.subtab-btn{padding:12px 16px;border:none;background:none;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px}
.subtab-btn.active{color:var(--green);border-bottom-color:var(--green)}
.subtab-content{display:none;padding:16px}
.subtab-content.active{display:block}
.filter-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
.filter-row input,.filter-row select{height:40px;border:1px solid var(--border);border-radius:8px;padding:0 12px;font-family:inherit;font-size:14px}
.filter-row button{height:40px;padding:0 16px;border:none;border-radius:8px;background:var(--green);color:#fff;font-family:inherit;font-size:14px;cursor:pointer}
.records-table{width:100%;border-collapse:collapse;font-size:13px}
.records-table th{background:var(--green-light);padding:8px 10px;text-align:left;font-size:12px;color:var(--muted)}
.records-table td{padding:8px 10px;border-bottom:1px solid var(--border)}
.records-table tr:nth-child(even) td{background:#fafaf8}
.download-btn{margin-top:14px;width:100%}

/* BACKUP */
#backup-section{margin:16px;padding:16px;background:var(--card);border:1px solid var(--border);border-radius:12px}
#backup-section h3{font-size:16px;margin-bottom:12px}
#backup-section .btn-row{display:flex;gap:10px;flex-wrap:wrap}

/* SEARCH TAB */
#search-input-el{width:100%;height:56px;border:1px solid var(--border);border-radius:12px;padding:0 18px;font-family:inherit;font-size:17px;margin-bottom:16px;outline:none}
#search-input-el:focus{border-color:var(--green)}
#search-results{display:flex;flex-direction:column;gap:10px}
.search-result-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,0.07);display:flex;justify-content:space-between;align-items:center}
.search-result-card:hover{border-color:var(--green)}
#search-detail{margin-top:16px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px}

/* INLINE EDIT */
.inline-input{border:1px solid var(--green);border-radius:6px;padding:4px 8px;font-family:inherit;font-size:14px;width:100%}

/* TABLE SCROLL */
.table-scroll{overflow-x:auto}

.green-flash{animation:greenflash 0.7s}
@keyframes greenflash{0%{background:rgba(26,122,74,0.15)}100%{background:transparent}}
</style>
</head>
<body>

<div id="loading-screen">Loading...</div>
<div id="toast"></div>

<!-- TOP NAV (desktop) -->
<div id="top-nav">
  <div id="top-nav-inner">
    <button class="top-nav-btn active" data-tab="entry" onclick="switchTab('entry')">✏️ Entry</button>
    <button class="top-nav-btn" data-tab="clients" onclick="switchTab('clients')">👥 Clients</button>
    <button class="top-nav-btn" data-tab="records" onclick="switchTab('records')">📊 Records</button>
    <button class="top-nav-btn" data-tab="search" onclick="switchTab('search')">🔍 Search</button>
  </div>
</div>

<!-- BOTTOM NAV (mobile) -->
<div id="bottom-nav">
  <button class="nav-btn active" data-tab="entry" onclick="switchTab('entry')"><span class="nav-icon">✏️</span>Entry</button>
  <button class="nav-btn" data-tab="clients" onclick="switchTab('clients')"><span class="nav-icon">👥</span>Clients</button>
  <button class="nav-btn" data-tab="records" onclick="switchTab('records')"><span class="nav-icon">📊</span>Records</button>
  <button class="nav-btn" data-tab="search" onclick="switchTab('search')"><span class="nav-icon">🔍</span>Search</button>
</div>

<div id="app-container">

  <!-- TAB 1: ENTRY -->
  <div id="tab-entry" class="tab-content active">
    <div id="date-bar">
      <span id="date-display"></span>
      <div style="display:flex;align-items:center;gap:8px">
        <div id="date-input-wrap">
          <input type="date" id="date-picker-input">
          <button onclick="applyDateEdit()" style="background:var(--green);color:#fff">OK</button>
          <button onclick="cancelDateEdit()" style="background:#e0ddd6">✕</button>
        </div>
        <button id="date-edit-btn" onclick="startDateEdit()">✏️</button>
      </div>
    </div>
    <div id="entry-section">
      <div class="table-wrap">
        <table class="entry-table" id="entry-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Customer</th>
              <th>Amount</th>
              <th>Type</th>
              <th>Note</th>
              <th style="width:40px"></th>
            </tr>
          </thead>
          <tbody id="entry-tbody"></tbody>
        </table>
      </div>
    </div>
    <div style="padding:0 0 12px">
      <div id="summary-cards">
        <div class="summary-card green"><div class="summary-label">Total Received Today</div><div class="summary-amount" id="sum-received">₹0</div></div>
        <div class="summary-card red"><div class="summary-label">Total Given Today</div><div class="summary-amount" id="sum-given">₹0</div></div>
        <div class="summary-card blue"><div class="summary-label">Net Today</div><div class="summary-amount" id="sum-net">₹0</div></div>
      </div>
    </div>
  </div>

  <!-- TAB 2: CLIENTS -->
  <div id="tab-clients" class="tab-content">
    <div id="clients-header">
      <h2 style="font-size:20px">Clients</h2>
      <button class="btn-green" onclick="toggleNewClientForm()">+ New Client</button>
    </div>
    <div id="new-client-form">
      <div class="form-row">
        <input type="text" id="nc-name" placeholder="Client Name *" style="height:52px">
        <input type="tel" id="nc-phone" placeholder="Phone (optional)">
      </div>
      <div class="btn-row">
        <button class="btn-green" onclick="saveNewClient()">Save</button>
        <button class="btn-gray" onclick="toggleNewClientForm(false)">Cancel</button>
      </div>
    </div>
    <div id="clients-list"></div>
  </div>

  <!-- TAB 3: RECORDS -->
  <div id="tab-records" class="tab-content">
    <div id="records-subtabs">
      <button class="subtab-btn active" onclick="switchSubtab('day')">DAY</button>
      <button class="subtab-btn" onclick="switchSubtab('month')">MONTH</button>
      <button class="subtab-btn" onclick="switchSubtab('year')">YEAR</button>
      <button class="subtab-btn" onclick="switchSubtab('range')">RANGE</button>
    </div>

    <div id="subtab-day" class="subtab-content active">
      <div class="filter-row">
        <input type="date" id="day-date-input">
        <button onclick="loadDayRecords()">View</button>
      </div>
      <div id="day-summary-cards" style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px"></div>
      <div class="table-scroll"><table class="records-table"><thead><tr><th>#</th><th>Customer</th><th>Type</th><th>Amount</th><th>Note</th><th></th></tr></thead><tbody id="day-tbody"></tbody></table></div>
      <button class="btn-green download-btn" onclick="downloadDayPDF()">Download Day PDF</button>
    </div>

    <div id="subtab-month" class="subtab-content">
      <div class="filter-row">
        <select id="month-sel"></select>
        <select id="year-sel-month"></select>
        <button onclick="loadMonthRecords()">View</button>
      </div>
      <div id="month-summary-cards" style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px"></div>
      <div class="table-scroll"><table class="records-table"><thead><tr><th>Date</th><th>Given</th><th>Received</th><th>Net</th></tr></thead><tbody id="month-tbody"></tbody></table></div>
      <button class="btn-green download-btn" onclick="downloadMonthPDF()">Download Month PDF</button>
    </div>

    <div id="subtab-year" class="subtab-content">
      <div class="filter-row">
        <select id="year-sel-year"></select>
        <button onclick="loadYearRecords()">View</button>
      </div>
      <div id="year-summary-cards" style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px"></div>
      <div class="table-scroll"><table class="records-table"><thead><tr><th>Month</th><th>Given</th><th>Received</th><th>Net</th></tr></thead><tbody id="year-tbody"></tbody></table></div>
      <button class="btn-green download-btn" onclick="downloadYearPDF()">Download Year PDF</button>
    </div>

    <div id="subtab-range" class="subtab-content">
      <div class="filter-row">
        <input type="date" id="range-from">
        <span>to</span>
        <input type="date" id="range-to">
        <button onclick="loadRangeRecords()">Apply</button>
      </div>
      <div id="range-summary-cards" style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px"></div>
      <div class="table-scroll"><table class="records-table"><thead><tr><th>Date</th><th>Given</th><th>Received</th><th>Net</th></tr></thead><tbody id="range-tbody"></tbody></table></div>
      <button class="btn-green download-btn" onclick="downloadRangePDF()">Download Range PDF</button>
    </div>

    <div id="backup-section">
      <h3>Backup &amp; Restore</h3>
      <div class="btn-row">
        <button class="btn-green" onclick="downloadBackup()">Download Backup</button>
        <label class="btn-gray" style="cursor:pointer;padding:10px 18px;border-radius:8px;font-size:14px;display:inline-block">Restore from Backup<input type="file" accept=".json" style="display:none" onchange="restoreBackup(this)"></label>
      </div>
    </div>
  </div>

  <!-- TAB 4: SEARCH -->
  <div id="tab-search" class="tab-content">
    <div style="padding:16px">
      <input type="text" id="search-input-el" placeholder="Search client name..." oninput="debounceSearch(this.value)">
      <div id="search-results"></div>
      <div id="search-detail" style="display:none"></div>
    </div>
  </div>

</div><!-- end app-container -->

<script>
// ==================== INDEXEDDB ====================
let db = null;

function initDB() {
  return new Promise(function(resolve, reject) {
    var req = indexedDB.open('FinanceTrackerDB', 1);
    req.onupgradeneeded = function(e) {
      var d = e.target.result;
      if (!d.objectStoreNames.contains('customers')) {
        var cs = d.createObjectStore('customers', { keyPath: 'id' });
        cs.createIndex('name', 'name', { unique: false });
      }
      if (!d.objectStoreNames.contains('transactions')) {
        var ts = d.createObjectStore('transactions', { keyPath: 'id' });
        ts.createIndex('date', 'date', { unique: false });
        ts.createIndex('customerId', 'customerId', { unique: false });
      }
      if (!d.objectStoreNames.contains('loans')) {
        var ls = d.createObjectStore('loans', { keyPath: 'id' });
        ls.createIndex('customerId', 'customerId', { unique: false });
      }
    };
    req.onsuccess = function(e) { db = e.target.result; resolve(db); };
    req.onerror = function(e) { reject(e.target.error); };
  });
}

function db_add(store, obj) {
  return new Promise(function(resolve, reject) {
    var tx = db.transaction(store, 'readwrite');
    var req = tx.objectStore(store).add(obj);
    req.onsuccess = function() { resolve(req.result); };
    req.onerror = function() { reject(req.error); };
  });
}

function db_getAll(store) {
  return new Promise(function(resolve, reject) {
    var tx = db.transaction(store, 'readonly');
    var req = tx.objectStore(store).getAll();
    req.onsuccess = function() { resolve(req.result); };
    req.onerror = function() { reject(req.error); };
  });
}

function db_delete(store, id) {
  return new Promise(function(resolve, reject) {
    var tx = db.transaction(store, 'readwrite');
    var req = tx.objectStore(store).delete(id);
    req.onsuccess = function() { resolve(); };
    req.onerror = function() { reject(req.error); };
  });
}

function db_update(store, obj) {
  return new Promise(function(resolve, reject) {
    var tx = db.transaction(store, 'readwrite');
    var req = tx.objectStore(store).put(obj);
    req.onsuccess = function() { resolve(); };
    req.onerror = function() { reject(req.error); };
  });
}

function db_getByIndex(store, indexName, value) {
  return new Promise(function(resolve, reject) {
    var tx = db.transaction(store, 'readonly');
    var idx = tx.objectStore(store).index(indexName);
    var req = idx.getAll(value);
    req.onsuccess = function() { resolve(req.result); };
    req.onerror = function() { reject(req.error); };
  });
}

function db_getByDateRange(store, startDate, endDate) {
  return new Promise(function(resolve, reject) {
    var tx = db.transaction(store, 'readonly');
    var idx = tx.objectStore(store).index('date');
    var range = IDBKeyRange.bound(startDate, endDate);
    var req = idx.getAll(range);
    req.onsuccess = function() { resolve(req.result); };
    req.onerror = function() { reject(req.error); };
  });
}

// ==================== GLOBALS ====================
window.allCustomers = [];
window.balanceMap = {};
window.allTransactions = [];
window.activeDate = todayStr();

function todayStr() {
  var d = new Date();
  return d.getFullYear() + '-' + pad2(d.getMonth()+1) + '-' + pad2(d.getDate());
}
function pad2(n) { return String(n).padStart(2,'0'); }

function formatDate(str) {
  if (!str) return '';
  var parts = str.split('-');
  var y = parts[0], m = parts[1], day = parts[2];
  var days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  var months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  var dt = new Date(+y, +m-1, +day);
  return days[dt.getDay()] + ', ' + day + ' ' + months[+m-1] + ' ' + y;
}

function fmtINR(n) {
  n = Number(n);
  if (isNaN(n)) return '₹0';
  return '₹' + n.toLocaleString('en-IN');
}

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2);
}

function loadAllData() {
  return Promise.all([db_getAll('customers'), db_getAll('transactions')]).then(function(results) {
    window.allCustomers = results[0];
    window.allTransactions = results[1];
    rebuildBalanceMap();
  });
}

function rebuildBalanceMap() {
  window.balanceMap = {};
  for (var i = 0; i < window.allTransactions.length; i++) {
    var t = window.allTransactions[i];
    if (!window.balanceMap[t.customerId]) window.balanceMap[t.customerId] = 0;
    if (t.type === 'received') window.balanceMap[t.customerId] += Number(t.amount);
    else window.balanceMap[t.customerId] -= Number(t.amount);
  }
}

// Outstanding = given - received (money lender: given=lent, received=repaid)
function getOutstanding(customerId) {
  return -(window.balanceMap[customerId] || 0);
}

// ==================== TOAST ====================
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(function() { t.style.opacity = '0'; }, 2000);
}

// ==================== TAB SWITCHING ====================
function switchTab(name) {
  document.querySelectorAll('.tab-content').forEach(function(el) { el.classList.remove('active'); });
  document.querySelectorAll('.nav-btn, .top-nav-btn').forEach(function(el) {
    el.classList.toggle('active', el.dataset.tab === name);
  });
  document.getElementById('tab-'+name).classList.add('active');
  if (name === 'entry') {
    window.activeDate = todayStr();
    updateDateDisplay();
    renderEntryTab();
  } else if (name === 'clients') {
    renderClientsList();
  } else if (name === 'records') {
    initRecordsSelectors();
  } else if (name === 'search') {
    document.getElementById('search-input-el').value = '';
    document.getElementById('search-results').innerHTML = '';
    document.getElementById('search-detail').style.display = 'none';
  }
}

// ==================== DATE BAR ====================
function updateDateDisplay() {
  document.getElementById('date-display').textContent = formatDate(window.activeDate);
}

function startDateEdit() {
  document.getElementById('date-input-wrap').style.display = 'flex';
  document.getElementById('date-edit-btn').style.display = 'none';
  document.getElementById('date-picker-input').value = window.activeDate;
}

function applyDateEdit() {
  var v = document.getElementById('date-picker-input').value;
  if (v) window.activeDate = v;
  cancelDateEdit();
  updateDateDisplay();
  renderEntryTab();
}

function cancelDateEdit() {
  document.getElementById('date-input-wrap').style.display = 'none';
  document.getElementById('date-edit-btn').style.display = '';
}

// ==================== ENTRY TAB ====================
var entryDropdownIndex = -1;
var activeDropdownItems = [];
var _selectedCustomer = null;

function renderEntryTab() {
  updateDateDisplay();
  var tbody = document.getElementById('entry-tbody');
  tbody.innerHTML = '';
  var todayTxns = window.allTransactions
    .filter(function(t) { return t.date === window.activeDate; })
    .sort(function(a,b) { return b.createdAt - a.createdAt; });
  var nextNum = todayTxns.length + 1;
  tbody.appendChild(buildActiveRow(nextNum));
  todayTxns.forEach(function(t, i) {
    tbody.appendChild(buildStaticRow(t, i+1));
  });
  updateSummaryCards();
  focusCustomerCell();
}

function buildActiveRow(num) {
  var tr = document.createElement('tr');
  tr.className = 'active-row';
  tr.id = 'active-row';
  tr.innerHTML =
    '<td class="cell-num" id="active-num">' + num + '</td>' +
    '<td style="position:relative"><div class="dropdown-wrap" id="cust-wrap">' +
      '<input class="cell-input" id="cust-input" placeholder="Name..." autocomplete="off" spellcheck="false">' +
      '<div class="customer-dropdown" id="cust-dropdown" style="display:none"></div>' +
    '</div></td>' +
    '<td><div class="amount-wrap"><span class="amount-prefix">₹</span>' +
      '<input class="cell-input amount-input" id="amt-input" placeholder="0" inputmode="decimal" autocomplete="off">' +
    '</div></td>' +
    '<td><input class="cell-input" id="type-input" value="received" autocomplete="off"></td>' +
    '<td><input class="cell-input" id="note-input" placeholder="note..." style="font-size:14px" autocomplete="off"></td>' +
    '<td></td>';

  setTimeout(function() {
    var custInput = document.getElementById('cust-input');
    var amtInput = document.getElementById('amt-input');
    var typeInput = document.getElementById('type-input');
    var noteInput = document.getElementById('note-input');
    if (!custInput) return;

    _selectedCustomer = null;

    custInput.addEventListener('input', onCustInput);
    custInput.addEventListener('keydown', onCustKeydown);
    custInput.addEventListener('blur', function() { setTimeout(closeDropdown, 150); });

    amtInput.addEventListener('input', function() {
      amtInput.value = amtInput.value.replace(/[^0-9.]/g, '');
    });
    amtInput.addEventListener('keydown', function(e) {
      if (e.key === 'Tab' || e.key === 'Enter') { e.preventDefault(); typeInput.focus(); }
    });

    typeInput.addEventListener('keydown', function(e) {
      if (e.key === 'Tab' || e.key === 'Enter') { e.preventDefault(); noteInput.focus(); }
    });
    typeInput.addEventListener('input', function() {
      var v = typeInput.value.toLowerCase();
      if (v.indexOf('g') !== -1) { typeInput.value = 'given'; }
      else if (v.indexOf('r') !== -1) { typeInput.value = 'received'; }
    });
    typeInput.addEventListener('focus', function() { typeInput.select(); });

    noteInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') { e.preventDefault(); saveActiveRow(); }
    });
  }, 0);

  return tr;
}

function buildStaticRow(t, rowNum) {
  var tr = document.createElement('tr');
  tr.className = 'static-row';
  tr.dataset.id = t.id;
  tr.innerHTML =
    '<td class="cell-num">' + rowNum + '</td>' +
    '<td style="padding:8px 6px;font-size:14px;font-weight:600">' + esc(t.customerName) + '</td>' +
    '<td style="padding:8px 6px;font-size:14px;font-weight:700">' + fmtINR(t.amount) + '</td>' +
    '<td style="padding:8px 6px;font-size:13px;color:var(--muted)">' + esc(t.type) + '</td>' +
    '<td style="padding:8px 6px;font-size:13px;color:var(--muted)">' + esc(t.note||'') + '</td>' +
    '<td><button class="delete-btn" data-del="' + t.id + '">✕</button></td>';
  tr.querySelector('.delete-btn').addEventListener('click', function(e) {
    e.stopPropagation();
    deleteEntryRow(t.id);
  });
  tr.addEventListener('click', function(e) {
    if (e.target.classList.contains('delete-btn')) return;
    openInlineEdit(tr, t);
  });
  return tr;
}

function openInlineEdit(tr, t) {
  if (tr.classList.contains('editing')) return;
  tr.classList.add('editing');
  var rowNum = tr.querySelector('.cell-num') ? tr.querySelector('.cell-num').textContent : '';
  tr.innerHTML =
    '<td class="cell-num">' + rowNum + '</td>' +
    '<td><input class="inline-input" id="edit-cust-' + t.id + '" value="' + esc(t.customerName) + '"></td>' +
    '<td><input class="inline-input" id="edit-amt-' + t.id + '" value="' + t.amount + '" inputmode="decimal"></td>' +
    '<td><input class="inline-input" id="edit-type-' + t.id + '" value="' + t.type + '"></td>' +
    '<td><input class="inline-input" id="edit-note-' + t.id + '" value="' + esc(t.note||'') + '"></td>' +
    '<td>' +
      '<button class="delete-btn" style="color:var(--green)" id="save-inline-' + t.id + '">✓</button>' +
      '<button class="delete-btn" id="cancel-inline-' + t.id + '">✕</button>' +
    '</td>';
  var typeInp = document.getElementById('edit-type-'+t.id);
  if (typeInp) {
    typeInp.addEventListener('input', function() {
      var v = typeInp.value.toLowerCase();
      if (v.indexOf('g') !== -1) typeInp.value = 'given';
      else if (v.indexOf('r') !== -1) typeInp.value = 'received';
    });
  }
  document.getElementById('save-inline-'+t.id).addEventListener('click', function() { saveInlineEdit(t.id); });
  document.getElementById('cancel-inline-'+t.id).addEventListener('click', function() { renderEntryTab(); });
  var ci = document.getElementById('edit-cust-'+t.id);
  if (ci) ci.focus();
}

function saveInlineEdit(id) {
  var t = window.allTransactions.find(function(x) { return x.id === id; });
  if (!t) return;
  var cName = (document.getElementById('edit-cust-'+id).value||'').trim();
  var amt = parseFloat(document.getElementById('edit-amt-'+id).value);
  var type = (document.getElementById('edit-type-'+id).value||'').trim();
  var note = (document.getElementById('edit-note-'+id).value||'').trim();
  if (!cName || !amt || amt <= 0) { showToast('Invalid data'); return; }
  var typeVal = (type === 'given') ? 'given' : 'received';
  t.customerName = cName;
  t.amount = amt;
  t.type = typeVal;
  t.note = note;
  db_update('transactions', t).then(function() {
    rebuildBalanceMap();
    renderEntryTab();
    showToast('Updated');
  });
}

function onCustInput() {
  var val = document.getElementById('cust-input').value;
  if (!val.trim()) { closeDropdown(); return; }
  var lower = val.toLowerCase();
  var starts = window.allCustomers.filter(function(c) { return c.name.toLowerCase().indexOf(lower) === 0; });
  var contains = window.allCustomers.filter(function(c) { return c.name.toLowerCase().indexOf(lower) !== 0 && c.name.toLowerCase().indexOf(lower) !== -1; });
  var matches = starts.concat(contains).slice(0, 6);
  showDropdown(matches, val);
}

function showDropdown(matches, rawVal) {
  var dd = document.getElementById('cust-dropdown');
  if (!dd) return;
  dd.innerHTML = '';
  entryDropdownIndex = -1;
  activeDropdownItems = [];

  matches.forEach(function(c, i) {
    var item = document.createElement('div');
    item.className = 'dropdown-item';
    var bal = getOutstanding(c.id);
    item.innerHTML = '<span class="d-name">' + esc(c.name) + '</span><span class="d-balance">' + fmtINR(Math.abs(bal)) + '</span>';
    item.addEventListener('mousedown', function(e) { e.preventDefault(); selectCustomer(c); });
    dd.appendChild(item);
    activeDropdownItems.push(item);
  });

  if (rawVal.trim()) {
    var addItem = document.createElement('div');
    addItem.className = 'dropdown-item add-new';
    addItem.innerHTML = '<span>+ Add "' + esc(rawVal.trim()) + '"</span>';
    addItem.addEventListener('mousedown', function(e) { e.preventDefault(); createAndSelectCustomer(rawVal.trim()); });
    dd.appendChild(addItem);
    activeDropdownItems.push(addItem);
  }

  var custInput = document.getElementById('cust-input');
  var rect = custInput.getBoundingClientRect();
  var isLower = rect.top > window.innerHeight / 2;
  dd.style.display = 'block';
  if (isLower) {
    dd.style.bottom = '100%';
    dd.style.top = 'auto';
  } else {
    dd.style.top = '100%';
    dd.style.bottom = 'auto';
  }
}

function closeDropdown() {
  var dd = document.getElementById('cust-dropdown');
  if (dd) dd.style.display = 'none';
  entryDropdownIndex = -1;
}

function onCustKeydown(e) {
  var dd = document.getElementById('cust-dropdown');
  if (!dd || dd.style.display === 'none') return;
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    entryDropdownIndex = Math.min(entryDropdownIndex+1, activeDropdownItems.length-1);
    updateDropdownFocus();
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    entryDropdownIndex = Math.max(entryDropdownIndex-1, 0);
    updateDropdownFocus();
  } else if (e.key === 'Enter') {
    e.preventDefault();
    if (entryDropdownIndex >= 0 && activeDropdownItems[entryDropdownIndex]) {
      activeDropdownItems[entryDropdownIndex].dispatchEvent(new MouseEvent('mousedown'));
    }
  } else if (e.key === 'Escape') {
    closeDropdown();
  }
}

function updateDropdownFocus() {
  activeDropdownItems.forEach(function(item, i) {
    item.classList.toggle('focused', i === entryDropdownIndex);
  });
}

function selectCustomer(c) {
  var ci = document.getElementById('cust-input');
  if (ci) ci.value = c.name;
  _selectedCustomer = c;
  closeDropdown();
  var ai = document.getElementById('amt-input');
  if (ai) ai.focus();
}

function createAndSelectCustomer(name) {
  var c = { id: uid(), name: name, phone: '', createdAt: Date.now() };
  db_add('customers', c).then(function() {
    window.allCustomers.push(c);
    selectCustomer(c);
    showToast('Customer "' + name + '" added');
  });
}

function saveActiveRow() {
  var custInput = document.getElementById('cust-input');
  var amtInput = document.getElementById('amt-input');
  var typeInput = document.getElementById('type-input');
  var noteInput = document.getElementById('note-input');
  if (!custInput) return;

  var custName = custInput.value.trim();
  var amount = parseFloat(amtInput.value);
  var type = typeInput.value.trim();
  var note = noteInput.value.trim();

  var valid = true;
  if (!custName) { shakeEl(custInput); valid = false; }
  if (!amount || amount <= 0) { shakeEl(amtInput); valid = false; }
  if (type !== 'given' && type !== 'received') { shakeEl(typeInput); valid = false; }
  if (!valid) return;

  var customer = _selectedCustomer;
  if (!customer || customer.name.toLowerCase() !== custName.toLowerCase()) {
    customer = window.allCustomers.find(function(c) { return c.name.toLowerCase() === custName.toLowerCase(); });
  }

  function doSave(customer) {
    var txn = {
      id: uid(),
      customerId: customer.id,
      customerName: customer.name,
      type: type,
      amount: amount,
      date: window.activeDate,
      note: note,
      createdAt: Date.now()
    };
    db_add('transactions', txn).then(function() {
      window.allTransactions.push(txn);
      rebuildBalanceMap();
      renderEntryTab();
      setTimeout(function() {
        var rows = document.querySelectorAll('#entry-tbody .static-row');
        if (rows[0]) {
          rows[0].classList.add('green-flash');
          setTimeout(function() { rows[0].classList.remove('green-flash'); }, 700);
        }
      }, 50);
    });
  }

  if (!customer) {
    customer = { id: uid(), name: custName, phone: '', createdAt: Date.now() };
    db_add('customers', customer).then(function() {
      window.allCustomers.push(customer);
      doSave(customer);
    });
  } else {
    doSave(customer);
  }
}

function deleteEntryRow(id) {
  if (!confirm('Delete this entry?')) return;
  db_delete('transactions', id).then(function() {
    window.allTransactions = window.allTransactions.filter(function(t) { return t.id !== id; });
    rebuildBalanceMap();
    renderEntryTab();
    showToast('Deleted');
  });
}

function updateSummaryCards() {
  var todayTxns = window.allTransactions.filter(function(t) { return t.date === window.activeDate; });
  var recv = 0, given = 0;
  todayTxns.forEach(function(t) {
    if (t.type === 'received') recv += Number(t.amount);
    else given += Number(t.amount);
  });
  document.getElementById('sum-received').textContent = fmtINR(recv);
  document.getElementById('sum-given').textContent = fmtINR(given);
  document.getElementById('sum-net').textContent = fmtINR(recv - given);
}

function focusCustomerCell() {
  setTimeout(function() {
    var ci = document.getElementById('cust-input');
    if (ci) { _selectedCustomer = null; ci.focus(); }
  }, 60);
}

function shakeEl(el) {
  el.classList.remove('shake');
  void el.offsetWidth;
  el.classList.add('shake');
  setTimeout(function() { el.classList.remove('shake'); }, 400);
}

// ==================== CLIENTS TAB ====================
function toggleNewClientForm(forceState) {
  var form = document.getElementById('new-client-form');
  var show = (forceState !== undefined) ? forceState : (form.style.display === 'none' || form.style.display === '');
  form.style.display = show ? 'block' : 'none';
  if (show) {
    document.getElementById('nc-name').focus();
  } else {
    document.getElementById('nc-name').value = '';
    document.getElementById('nc-phone').value = '';
  }
}

function saveNewClient() {
  var name = document.getElementById('nc-name').value.trim();
  var phone = document.getElementById('nc-phone').value.trim();
  if (!name) { shakeEl(document.getElementById('nc-name')); return; }
  var c = { id: uid(), name: name, phone: phone, createdAt: Date.now() };
  db_add('customers', c).then(function() {
    window.allCustomers.push(c);
    toggleNewClientForm(false);
    renderClientsList();
    showToast('Client added');
  });
}

function renderClientsList() {
  var list = document.getElementById('clients-list');
  list.innerHTML = '';
  var sorted = window.allCustomers.slice().sort(function(a,b) { return a.name.localeCompare(b.name); });
  sorted.forEach(function(c) {
    var outstanding = getOutstanding(c.id);
    var card = document.createElement('div');
    card.className = 'client-card';
    card.id = 'client-card-' + c.id;
    card.innerHTML =
      '<div class="client-card-header">' +
        '<div><div class="client-name-big">' + esc(c.name) + '</div>' +
        '<div class="client-phone">' + esc(c.phone||'') + '</div></div>' +
        '<div class="client-balance">' + fmtINR(Math.abs(outstanding)) + '</div>' +
      '</div>' +
      '<div class="client-detail" id="detail-' + c.id + '"></div>';
    card.querySelector('.client-card-header').addEventListener('click', function() { toggleClientDetail(c); });
    list.appendChild(card);
  });
}

function toggleClientDetail(c) {
  var detail = document.getElementById('detail-' + c.id);
  if (!detail) return;
  if (detail.style.display === 'block') {
    detail.style.display = 'none';
    return;
  }
  detail.style.display = 'block';
  renderClientDetail(c, detail);
}

function renderClientDetail(c, container) {
  Promise.all([
    db_getByIndex('transactions', 'customerId', c.id),
    db_getByIndex('loans', 'customerId', c.id)
  ]).then(function(results) {
    var txns = results[0];
    var loans = results[1];
    txns.sort(function(a,b) { return b.createdAt - a.createdAt; });
    var totalGiven = 0, totalReceived = 0;
    txns.forEach(function(t) {
      if (t.type === 'given') totalGiven += Number(t.amount);
      else totalReceived += Number(t.amount);
    });
    var outstanding = totalGiven - totalReceived;

    var txnRows = txns.map(function(t) {
      return '<tr><td>' + t.date + '</td><td>' + esc(t.type) + '</td><td>' + fmtINR(t.amount) + '</td>' +
        '<td style="color:var(--muted);font-size:12px">' + esc(t.note||'') + '</td>' +
        '<td><button class="delete-btn" data-del-txn="' + t.id + '" data-cid="' + c.id + '">✕</button></td></tr>';
    }).join('');

    var loansHtml = '';
    if (loans.length > 0) {
      loansHtml = '<div style="margin-top:12px"><div class="section-title">Loans</div><div class="table-scroll">' +
        '<table class="detail-table"><thead><tr><th>Principal</th><th>Rate/Day</th><th>Days</th><th>Start</th><th></th></tr></thead><tbody>' +
        loans.map(function(l) {
          return '<tr><td>' + fmtINR(l.principal) + '</td><td>' + l.dailyRate + '%</td><td>' + l.durationDays + '</td><td>' + l.startDate + '</td>' +
            '<td><button class="delete-btn" data-del-loan="' + l.id + '" data-cid="' + c.id + '">✕</button></td></tr>';
        }).join('') +
        '</tbody></table></div></div>';
    }

    container.innerHTML =
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">' +
        '<div>' +
          '<div id="cd-name-' + c.id + '" style="font-size:16px;font-weight:700">' + esc(c.name) +
            ' <button class="edit-icon-btn" data-edit-name="' + c.id + '">✏️</button></div>' +
          '<div id="cd-phone-' + c.id + '" style="font-size:13px;color:var(--muted)">' + esc(c.phone||'—') +
            ' <button class="edit-icon-btn" data-edit-phone="' + c.id + '">✏️</button></div>' +
        '</div>' +
      '</div>' +
      '<div class="stat-boxes">' +
        '<div class="stat-box"><div class="stat-box-label">Total Given</div><div class="stat-box-val">' + fmtINR(totalGiven) + '</div></div>' +
        '<div class="stat-box"><div class="stat-box-label">Total Received</div><div class="stat-box-val">' + fmtINR(totalReceived) + '</div></div>' +
        '<div class="stat-box"><div class="stat-box-label">Outstanding</div><div class="stat-box-val">' + fmtINR(Math.abs(outstanding)) + '</div></div>' +
      '</div>' +
      '<div class="section-title">Transactions</div>' +
      '<div class="table-scroll"><table class="detail-table">' +
        '<thead><tr><th>Date</th><th>Type</th><th>Amount</th><th>Note</th><th></th></tr></thead>' +
        '<tbody>' + txnRows + '</tbody>' +
      '</table></div>' +
      '<div class="loan-form" style="margin-top:14px">' +
        '<div class="section-title" style="margin-bottom:10px">Add Loan</div>' +
        '<div class="loan-form-grid">' +
          '<div><label>Principal</label><input type="number" id="loan-principal-' + c.id + '" placeholder="0"></div>' +
          '<div><label>Daily Rate %</label><input type="number" id="loan-rate-' + c.id + '" placeholder="0.00" step="0.01"></div>' +
          '<div><label>Duration (days)</label><input type="number" id="loan-days-' + c.id + '" placeholder="30"></div>' +
          '<div><label>Start Date</label><input type="date" id="loan-start-' + c.id + '" value="' + todayStr() + '"></div>' +
        '</div>' +
        '<button class="btn-green" data-add-loan="' + c.id + '">Add Loan</button>' +
      '</div>' +
      loansHtml +
      '<div style="margin-top:16px"><button class="btn-red" data-del-client="' + c.id + '">Delete Client</button></div>';

    // Wire events
    container.querySelectorAll('[data-del-txn]').forEach(function(btn) {
      btn.addEventListener('click', function() { deleteClientTxn(btn.dataset.delTxn, btn.dataset.cid); });
    });
    container.querySelectorAll('[data-del-loan]').forEach(function(btn) {
      btn.addEventListener('click', function() { deleteLoan(btn.dataset.delLoan, btn.dataset.cid); });
    });
    container.querySelector('[data-add-loan]').addEventListener('click', function(e) { saveLoan(e.target.dataset.addLoan); });
    container.querySelector('[data-del-client]').addEventListener('click', function(e) { deleteClient(e.target.dataset.delClient); });
    container.querySelector('[data-edit-name]').addEventListener('click', function(e) { startEditClientName(e.target.dataset.editName); });
    container.querySelector('[data-edit-phone]').addEventListener('click', function(e) { startEditClientPhone(e.target.dataset.editPhone); });
  });

    db_getByIndex('loans', 'customerId', cid)

var _monthData = { rows:[], recv:0, given:0, net:0, label:'' };
function loadMonthRecords() {
  var m = document.getElementById('month-sel').value;
  var y = document.getElementById('year-sel-month').value;
  var monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  var daysInMonth = new Date(+y, +m, 0).getDate();
  var startDate = y + '-' + m + '-01';
  var endDate = y + '-' + m + '-' + pad2(daysInMonth);
  db_getByDateRange('transactions', startDate, endDate).then(function(txns) {
    var dayMap = {};
    txns.forEach(function(t) {
      if (!dayMap[t.date]) dayMap[t.date] = { given:0, received:0 };
      if (t.type==='given') dayMap[t.date].given += Number(t.amount);
      else dayMap[t.date].received += Number(t.amount);
    });
    var totalRecv = 0, totalGiven = 0;
    var rows = [];
    for (var d = 1; d <= daysInMonth; d++) {
      var dateStr = y + '-' + m + '-' + pad2(d);
      var data = dayMap[dateStr] || { given:0, received:0 };
      totalGiven += data.given;
      totalRecv += data.received;
      rows.push({ date: dateStr, given: data.given, received: data.received, net: data.received - data.given });
    }
    _monthData = { rows: rows, recv: totalRecv, given: totalGiven, net: totalRecv-totalGiven, label: monthNames[+m-1] + ' ' + y };
    document.getElementById('month-summary-cards').innerHTML = buildSummaryCards3(totalRecv, totalGiven, totalRecv-totalGiven);
    var tbody = document.getElementById('month-tbody');
    tbody.innerHTML = '';
    rows.forEach(function(r) {
      if (r.given === 0 && r.received === 0) return;
      var tr = document.createElement('tr');
      tr.innerHTML = '<td>' + r.date + '</td><td>' + fmtINR(r.given) + '</td><td>' + fmtINR(r.received) + '</td><td>' + fmtINR(r.net) + '</td>';
      tbody.appendChild(tr);
    });
  });
}

    a.href = url;
    a.download = 'finance-backup-' + todayStr() + '.json';
    a.click();
    URL.revokeObjectURL(url);
    showToast('Backup downloaded');
  });

function restoreBackup(input) {
  var file = input.files[0];
  if (!file) return;
  if (!confirm('This will REPLACE all existing data. Are you sure?')) { input.value = ''; return; }
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = JSON.parse(e.target.result);
      if (!data.version || !data.customers || !data.transactions) { showToast('Invalid backup file'); return; }
      var tx1 = db.transaction(['customers','transactions','loans'], 'readwrite');
      tx1.objectStore('customers').clear();
      tx1.objectStore('transactions').clear();
      tx1.objectStore('loans').clear();
      tx1.oncomplete = function() {
        var promises = [];
        data.customers.forEach(function(c) { promises.push(db_add('customers', c)); });
        data.transactions.forEach(function(t) { promises.push(db_add('transactions', t)); });
        (data.loans||[]).forEach(function(l) { promises.push(db_add('loans', l)); });
        Promise.all(promises).then(function() {
          return loadAllData();
        }).then(function() {
          renderClientsList();
          renderEntryTab();
          showToast('Backup restored');
        });
      };
    } catch(err) {
      showToast('Error: ' + err.message);
    }
    input.value = '';
  };
  reader.readAsText(file);
}

function runSearch(val) {

    card.innerHTML = '<div><div style="font-weight:700;font-size:16px">' + esc(c.name) + '</div><div style="font-size:13px;color:var(--muted)">' + esc(c.phone||'') + '</div></div>' +

function makePdfDidDrawPage(doc, periodStr) {
  return function(data) {
    var pageW = doc.internal.pageSize.getWidth();
    var pageH = doc.internal.pageSize.getHeight();
    // Header
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(9);
    doc.setTextColor(0, 0, 0);
    doc.text('Finance Tracker', 10, 8);
    doc.setFont('helvetica', 'normal');
    doc.text(periodStr, pageW-10, 8, { align: 'right' });
    doc.setDrawColor(180, 180, 180);
    doc.line(10, 11, pageW-10, 11);
    // Footer
    var now = new Date();
    var printed = 'Printed: ' + pad2(now.getDate()) + '/' + pad2(now.getMonth()+1) + '/' + now.getFullYear() + ' ' + pad2(now.getHours()) + ':' + pad2(now.getMinutes());
    doc.setFontSize(7);
    doc.setTextColor(150, 150, 150);
    var totalPages = doc.internal.getNumberOfPages();
    doc.text('Page ' + data.pageNumber + ' / ' + totalPages, pageW/2, pageH-6, { align: 'center' });
    doc.text(printed, pageW-10, pageH-6, { align: 'right' });
    doc.setTextColor(0, 0, 0);
  };
}

function basePdfOpts(doc, periodStr) {
  return {
    styles: { font: 'helvetica', fontSize: 8, cellPadding: 1.2, lineWidth: 0.1 },
    headStyles: { fillColor: [26, 122, 74], textColor: [255, 255, 255], fontStyle: 'bold', fontSize: 9, cellPadding: 1.5 },
    alternateRowStyles: { fillColor: [247, 246, 242] },
    margin: { top: 20, bottom: 15, left: 10, right: 10 },
    startY: 22,
    compress: true,
    didDrawPage: makePdfDidDrawPage(doc, periodStr)
  };
}

function downloadDayPDF() {
  var date = document.getElementById('day-date-input').value;
  if (!date || !_dayTxns.length) { showToast('No data to export'); return; }
  var jsPDF = window.jspdf.jsPDF;
  var doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4', compress: true });
  var recv = 0, given = 0;
  var body = _dayTxns.map(function(t, i) {
    if (t.type==='received') recv += Number(t.amount); else given += Number(t.amount);
    return [i+1, t.customerName, t.type, fmtINR(t.amount), t.note||''];
  });
  body.push([{ content: 'Total Received: ' + fmtINR(recv) + '   Given: ' + fmtINR(given) + '   Net: ' + fmtINR(recv-given), colSpan: 5, styles: { fillColor: [232,245,238], fontStyle: 'bold' } }]);
  var opts = basePdfOpts(doc, date);
  doc.autoTable(Object.assign({ head: [['#','Customer','Type','Amount','Note']], body: body }, opts));
  doc.save('finance-day-' + date + '.pdf');
}

function downloadRangePDF() {

function downloadClientPDF(cid) {
  var c = window.allCustomers.find(function(x) { return x.id === cid; });
  if (!c) return;
  db_getByIndex('transactions', 'customerId', cid).then(function(txns) {
    if (searchDetailFrom) txns = txns.filter(function(t) { return t.date >= searchDetailFrom; });
    if (searchDetailTo) txns = txns.filter(function(t) { return t.date <= searchDetailTo; });
    txns.sort(function(a,b) { return b.date > a.date ? -1 : b.date < a.date ? 1 : 0; });
    txns.reverse();
    var totalGiven = 0, totalReceived = 0;
    var body = txns.map(function(t, i) {
      if (t.type==='given') totalGiven += Number(t.amount); else totalReceived += Number(t.amount);
      return [i+1, t.date, t.type, fmtINR(t.amount), t.note||''];
    });
    body.push([{ content: 'Given: ' + fmtINR(totalGiven) + '   Received: ' + fmtINR(totalReceived) + '   Outstanding: ' + fmtINR(Math.abs(totalGiven-totalReceived)), colSpan: 5, styles: { fillColor: [232,245,238], fontStyle: 'bold' } }]);
    var jsPDF = window.jspdf.jsPDF;
    var doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4', compress: true });
    var periodStr = c.name + (c.phone ? ' | ' + c.phone : '');
    var opts = basePdfOpts(doc, periodStr);
    doc.autoTable(Object.assign({ head: [['#','Date','Type','Amount','Note']], body: body }, opts));
    doc.save('finance-client-' + c.name.replace(/\s+/g, '-') + '.pdf');
  });
}

// ==================== UTILS ====================
function esc(str) {
  if (str === null || str === undefined) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Click outside dropdown closes it
document.addEventListener('click', function(e) {
  var wrap = document.getElementById('cust-wrap');
  if (wrap && !wrap.contains(e.target)) closeDropdown();
});

// ==================== INIT ====================
initDB().then(function() {
  return loadAllData();
}).then(function() {
  document.getElementById('loading-screen').style.display = 'none';
  updateDateDisplay();
  renderEntryTab();
}).catch(function(err) {
  document.getElementById('loading-screen').textContent = 'Error loading database: ' + (err && err.message ? err.message : err);
});
